<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Toko Karya Cemerlang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        h2 { margin-bottom: 8px; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #64748b; font-size: 14px; font-weight: 600; }
        input {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; outline: none; transition: all 0.3s ease;
        }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-submit {
            background: #0f172a; color: white; border: none; padding: 14px; width: 100%;
            border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.25); }
        .back-link { display: inline-block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">⚡</div>
        <h2>Login Admin</h2>
        <p class="subtitle">Silakan masukkan password untuk mengakses Laporan & Dashboard</p>
        
        <form action="orders.html" method="GET">
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autofocus placeholder="Masukkan password admin...">
            </div>
            <button type="submit" class="btn-submit">Masuk ke Dashboard</button>
        </form>
        <a href="index.html" class="back-link">Kembali ke Beranda</a>
    </div>
</body>
</html>
