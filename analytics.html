<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Pendapatan - Toko Karya Cemerlang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-color: #070913;
            --panel-bg: rgba(13, 17, 28, 0.7);
            --border-glow: rgba(0, 243, 255, 0.2);
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --text-main: #e2e8f0;
            --text-muted: #8b9bb4;
            --glass-border: 1px solid rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.06), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(188, 19, 254, 0.06), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* NAVBAR */
        header {
            background: rgba(7, 9, 19, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glow);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0.05);
        }

        .btn-outline:hover {
            background: rgba(0, 243, 255, 0.1);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: inset 0 0 10px rgba(188, 19, 254, 0.05);
        }

        .btn-primary:hover {
            background: rgba(188, 19, 254, 0.1);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3), inset 0 0 10px rgba(188, 19, 254, 0.2);
        }

        .dashboard {
            padding: 50px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .stat-card,
        .content-box {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: var(--glass-border);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .stat-card:hover,
        .content-box:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 243, 255, 0.05);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .stat-card.green::before {
            background: var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-card h1 {
            color: #fff;
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .content-box h2 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.4);
        }

        .data-list {
            list-style: none;
        }

        .data-list li {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: var(--transition);
        }

        .data-list li:last-child {
            border-bottom: none;
        }

        .data-list li:hover {
            background: rgba(255, 255, 255, 0.02);
            padding-left: 10px;
            padding-right: 10px;
            border-radius: 8px;
        }

        .data-name {
            font-weight: 500;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .data-value {
            font-weight: 700;
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .nav-date {
            display: flex;
            align-items: center;
            margin-right: 15px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 1px;
        }

        @media print {
            header {
                display: none !important;
            }

            body {
                background: white;
                background-image: none;
                color: black;
            }

            .dashboard {
                padding: 0;
            }

            .stat-card,
            .content-box {
                background: white;
                border: 1px solid #ccc;
                box-shadow: none;
                filter: none;
            }

            .stat-card::before {
                display: none;
            }

            .stat-card h1,
            .stat-card h3,
            .content-box h2,
            .data-name {
                color: black;
                text-shadow: none;
            }

            .data-value {
                background: #eee;
                color: black;
                border: 1px solid #ccc;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">Laporan & Analisis Data</div>
        <div class="nav-buttons">
            <form action="analytics.html" method="GET" class="nav-date" style="margin-right: 15px; margin-bottom: 0;">
                <label for="date-filter" style="margin-right: 8px; font-size: 16px;">📅</label>
                <input type="date" id="date-filter" name="date" value="" onchange="this.form.submit()"
                       style="background: rgba(13, 17, 28, 0.7); border: 1px solid var(--border-glow); color: var(--neon-cyan); padding: 6px 10px; border-radius: 6px; outline: none; font-family: 'Inter', sans-serif;">
            </form>
            <button class="btn btn-outline" onclick="window.print()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                Cetak Laporan
            </button>
            <a href="index.html" class="btn btn-outline" style="margin-right: 8px;">Beranda</a>
        </div>
    </header>

    <div class="dashboard">

        <div class="card-box">
            <div class="stat-card">
                <h3>Total Orderan Masuk</h3>
                <h1>2 <span
                        style="font-size:14px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:1px; text-shadow:none;">transaksi</span>
                </h1>
            </div>

            <div class="stat-card green">
                <h3>Total Pendapatan Bersih</h3>
                <h1>
                    Rp 26.500.000
                </h1>
            </div>
        </div>

        <div class="card-box" style="grid-template-columns: 1fr;">
            <div class="content-box">
                <h2>Rincian Penjualan per Produk</h2>
                <ul class="data-list">
                    <li>
                        <span class="data-name">Lenovo ThinkPad X1</span>
                        <span class="data-value">1 Terjual</span>
                    </li>
                    <li>
                        <span class="data-name">Dell XPS 13</span>
                        <span class="data-value">1 Terjual</span>
                    </li>
                </ul>
            </div>
        </div>

    </div>

    <script>
        // Mempertahankan nilai tanggal yang dipilih setelah halaman dimuat ulang
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const dateParam = urlParams.get('date');
            if (dateParam) {
                document.getElementById('date-filter').value = dateParam;
            }
        });
    </script>
</body>

</html>
