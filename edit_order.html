<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Order - Toko Karya Cemerlang</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 40px; display: flex; justify-content: center; color: #334155; }
        .form-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border: 1px solid #f1f5f9; }
        .form-container h2 { margin-top: 0; color: #0f172a; margin-bottom: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #64748b; font-weight: 600; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 15px; font-family: 'Inter', sans-serif; background: #f8fafc; transition: all 0.3s ease; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2563eb; background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .btn-submit { background: #2563eb; color: white; border: none; padding: 14px 24px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 15px; font-weight: 600; margin-top: 10px; transition: all 0.3s ease; }
        .btn-submit:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.25); }
        .btn-cancel { background: white; color: #334155; border: 1px solid #cbd5e1; text-decoration: none; display: inline-block; padding: 14px 24px; border-radius: 12px; text-align: center; width: 100%; box-sizing: border-box; margin-top: 10px; font-weight: 600; font-size: 15px; transition: all 0.3s ease; }
        .btn-cancel:hover { background: #f1f5f9; border-color: #94a3b8; }
    </style>
</head>
<body>
<div id="top-date-display" style="position: absolute; top: 20px; right: 20px; font-weight: 500; color: #64748b; background: white; padding: 8px 16px; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 1000; font-size: 14px;">
    📅 Memuat tanggal...
</div>
    <div class="form-container">
        <h2 id="edit-title">Edit Order</h2>
        <form id="edit-form">
            <div class="form-group">
                <label>Nama Pemesan</label>
                <input type="text" name="nama" id="input-nama" required>
            </div>
            <div class="form-group">
                <label>Alamat Pengiriman</label>
                <textarea name="alamat" id="input-alamat" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select name="metode" id="input-metode" required>
                    <option value="Transfer Bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                    <option value="COD">Bayar di Tempat (COD)</option>
                    <option value="E-Wallet">E-Wallet (GoPay/OVO/Dana)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tanggal Pembelian</label>
                <input type="date" name="tanggal" id="input-tanggal" required readonly style="color: #94a3b8; cursor: not-allowed;">
            </div>
            <button type="submit" class="btn-submit">Simpan Perubahan</button>
            <a href="orders.html" class="btn-cancel">Batal</a>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set auto date for display
            const today = new Date();
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const displayDate = `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
            document.getElementById('top-date-display').innerHTML = `📅 ${displayDate}`;

            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');

            if (!orderId) {
                alert('ID Order tidak ditemukan. Mengalihkan ke halaman pesanan.');
                window.location.href = 'orders.html';
                return;
            }

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const orderIndex = orders.findIndex(o => o.id === orderId);

            if (orderIndex === -1) {
                alert('Order tidak ditemukan. Mungkin sudah dihapus.');
                window.location.href = 'orders.html';
                return;
            }

            const order = orders[orderIndex];

            // Isi form dengan data yang ada
            document.getElementById('edit-title').textContent = `Edit Order #${order.id.slice(-4)}`;
            document.getElementById('input-nama').value = order.nama;
            document.getElementById('input-alamat').value = order.alamat;
            
            // Set dropdown value
            const metodeSelect = document.getElementById('input-metode');
            for(let i=0; i<metodeSelect.options.length; i++) {
                if(metodeSelect.options[i].value === order.metode) {
                    metodeSelect.selectedIndex = i;
                    break;
                }
            }

            document.getElementById('input-tanggal').value = order.tanggal; // tetap tanggal asli saat order dibuat

            // Handle submit
            document.getElementById('edit-form').addEventListener('submit', function(e) {
                e.preventDefault();

                orders[orderIndex].nama = document.getElementById('input-nama').value;
                orders[orderIndex].alamat = document.getElementById('input-alamat').value;
                orders[orderIndex].metode = document.getElementById('input-metode').value;
                
                localStorage.setItem('orders', JSON.stringify(orders));
                
                // Kembali ke halaman orders dengan pesan sukses bisa ditambahkan jika mau
                window.location.href = 'orders.html';
            });
        });
    </script>
</body>
</html>
