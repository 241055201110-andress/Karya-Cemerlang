<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Order - Toko Karya Cemerlang</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-dark); 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            color: var(--text-main); 
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite alternate;
        }

        body::before {
            background: var(--primary);
            top: 10%;
            left: 20%;
        }

        body::after {
            background: var(--accent);
            bottom: 10%;
            right: 20%;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .form-container { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 500px; 
            border: 1px solid var(--border); 
            position: relative;
            z-index: 1;
        }

        .form-container h2 { 
            margin-top: 0; 
            color: white; 
            margin-bottom: 24px; 
            font-weight: 800; 
            font-size: 28px;
            letter-spacing: -0.5px; 
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            font-weight: 500; 
            font-size: 14px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px; 
            font-family: 'Outfit', sans-serif; 
            background: rgba(0,0,0,0.2); 
            color: white;
            transition: var(--transition); 
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.4); 
            box-shadow: 0 0 15px var(--primary-glow); 
        }
        
        .form-group input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            cursor: not-allowed;
            border-color: transparent;
        }

        .form-group select option {
            background: var(--bg-dark);
            color: white;
        }

        .btn-submit { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: 600; 
            margin-top: 10px; 
            transition: var(--transition); 
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-submit:hover { 
            box-shadow: 0 0 30px var(--primary-glow); 
            transform: translateY(-2px); 
        }

        .btn-cancel { 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-main); 
            border: 1px solid var(--border); 
            text-decoration: none; 
            display: inline-block; 
            padding: 14px 24px; 
            border-radius: 12px; 
            text-align: center; 
            width: 100%; 
            box-sizing: border-box; 
            margin-top: 15px; 
            font-weight: 600; 
            font-size: 16px; 
            transition: var(--transition); 
        }

        .btn-cancel:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2); 
            transform: translateY(-2px);
        }

        #top-date-display {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-weight: 500; 
            color: var(--text-muted); 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 8px 16px; 
            border-radius: 50px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            z-index: 1000; 
            font-size: 14px;
        }
    </style>
</head>
<body>
<div id="top-date-display">
    📅 Memuat tanggal...
</div>
    <div class="form-container">
        <h2 id="edit-title">Edit Order</h2>
        <form id="edit-form">
            <div class="form-group">
                <label>Nama Pemesan</label>
                <input type="text" name="nama" id="input-nama" required>
            </div>
            <div class="form-group">
                <label>Alamat Pengiriman</label>
                <textarea name="alamat" id="input-alamat" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select name="metode" id="input-metode" required>
                    <option value="Transfer Bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                    <option value="COD">Bayar di Tempat (COD)</option>
                    <option value="E-Wallet">E-Wallet (GoPay/OVO/Dana)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tanggal Pembelian</label>
                <input type="date" name="tanggal" id="input-tanggal" required readonly>
            </div>
            <button type="submit" class="btn-submit">Simpan Perubahan</button>
            <a href="orders.html" class="btn-cancel">Batal</a>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set auto date for display
            const today = new Date();
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const displayDate = `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
            document.getElementById('top-date-display').innerHTML = `📅 ${displayDate}`;

            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');

            if (!orderId) {
                alert('ID Order tidak ditemukan. Mengalihkan ke halaman pesanan.');
                window.location.href = 'orders.html';
                return;
            }

            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const orderIndex = orders.findIndex(o => o.id === orderId);

            if (orderIndex === -1) {
                alert('Order tidak ditemukan. Mungkin sudah dihapus.');
                window.location.href = 'orders.html';
                return;
            }

            const order = orders[orderIndex];

            // Isi form dengan data yang ada
            document.getElementById('edit-title').textContent = `Edit Order #${order.id.slice(-4)}`;
            document.getElementById('input-nama').value = order.nama;
            document.getElementById('input-alamat').value = order.alamat;
            
            // Set dropdown value
            const metodeSelect = document.getElementById('input-metode');
            for(let i=0; i<metodeSelect.options.length; i++) {
                if(metodeSelect.options[i].value === order.metode) {
                    metodeSelect.selectedIndex = i;
                    break;
                }
            }

            document.getElementById('input-tanggal').value = order.tanggal; // tetap tanggal asli saat order dibuat

            // Handle submit
            document.getElementById('edit-form').addEventListener('submit', function(e) {
                e.preventDefault();

                orders[orderIndex].nama = document.getElementById('input-nama').value;
                orders[orderIndex].alamat = document.getElementById('input-alamat').value;
                orders[orderIndex].metode = document.getElementById('input-metode').value;
                
                localStorage.setItem('orders', JSON.stringify(orders));
                
                window.location.href = 'orders.html';
            });
        });
    </script>
</body>
</html>
