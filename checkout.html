<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Produk - Toko Karya Cemerlang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #10b981;
            --dark: #0f172a;
            --gray-light: #f8fafc;
            --gray: #64748b;
            --text-main: #334155;
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--gray-light); color: var(--text-main); line-height: 1.6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .checkout-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
            max-width: 1000px;
            width: 100%;
        }

        .product-preview {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .product-preview::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top left, rgba(37,99,235,0.2), transparent);
        }

        .product-image-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            width: 80%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        .product-image-container div {
            font-size: 80px;
        }

        .product-details { position: relative; z-index: 1; }
        .product-details h3 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        .product-price { font-size: 28px; font-weight: 800; color: #60a5fa; margin-bottom: 10px; }

        .checkout-form-container {
            padding: 50px 40px;
        }

        .checkout-form-container h2 {
            font-size: 28px; font-weight: 800; color: var(--dark); margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 600; color: var(--gray); margin-bottom: 8px;
        }
        
        .form-control {
            width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px;
            font-size: 15px; color: var(--dark); background: #f8fafc; transition: var(--transition);
        }
        .form-control:focus {
            outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
        }

        textarea.form-control { resize: vertical; min-height: 100px; }

        .action-buttons {
            display: flex; gap: 15px; margin-top: 30px;
        }

        .btn {
            padding: 14px 24px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer;
            transition: var(--transition); border: none; flex: 1; text-align: center; text-decoration: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.25); }
        
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: var(--text-main); }
        .btn-outline:hover { background: #f1f5f9; border-color: #94a3b8; }

        @media (max-width: 768px) {
            .checkout-wrapper { grid-template-columns: 1fr; }
            .product-preview { padding: 30px 20px; }
            .product-image-container { width: 60%; }
            .checkout-form-container { padding: 30px 20px; }
            .action-buttons { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>
<div id="top-date-display" style="position: absolute; top: 20px; right: 20px; font-weight: 500; color: var(--gray); background: white; padding: 8px 16px; border-radius: 50px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 1000;">
    📅 Memuat tanggal...
</div>

<div class="checkout-wrapper">
    <!-- Product Summary -->
    <div class="product-preview">
        <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=600&q=80" alt="Lenovo ThinkPad X1" style="max-width: 100%; max-height: 100%; border-radius: 12px; object-fit: contain;">
        </div>
        <div class="product-details">
            <h3>Lenovo ThinkPad X1</h3>
            <div class="product-price">Rp 14.500.000</div>
            <p style="color: #94a3b8; font-size: 14px;">Termasuk Garansi Toko & Asuransi Pengiriman</p>
        </div>
    </div>

    <!-- Form Section -->
    <div class="checkout-form-container">
        <h2>Formulir Pembelian</h2>
        <form action="orders.html" method="GET">
            <div class="form-group">
                <label>Nama Lengkap Pembeli</label>
                <input type="text" name="nama" class="form-control" placeholder="Masukkan nama lengkap Anda" required>
            </div>
            
            <div class="form-group">
                <label>Alamat Pengiriman</label>
                <textarea name="alamat" class="form-control" placeholder="Sertakan detail seperti jalan, nomor rumah, rt/rw, dan kecamatan" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select name="metode" class="form-control" required>
                    <option value="Transfer Bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                    <option value="COD">Bayar di Tempat (COD)</option>
                    <option value="E-Wallet">E-Wallet (GoPay/OVO/Dana)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tanggal Pembelian</label>
                <input type="date" name="tanggal" id="tanggal-input" class="form-control" required readonly>
            </div>

            <div class="action-buttons">
                <a href="javascript:history.back()" class="btn btn-outline">Kembali</a>
                <button type="submit" class="btn btn-primary">Konfirmasi & Bayar</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Set auto date
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const formattedDate = `${yyyy}-${mm}-${dd}`;
        
        document.getElementById('tanggal-input').value = formattedDate;

        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const displayDate = `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
        document.getElementById('top-date-display').innerHTML = `📅 ${displayDate}`;

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name') || 'Laptop Seken';
        const productPrice = urlParams.get('price') || '0';
        const productImage = urlParams.get('img') || 'https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=600&q=80';

        // Update preview content
        document.querySelector('.product-details h3').innerText = productName;
        document.querySelector('.product-price').innerText = `Rp ${parseInt(productPrice).toLocaleString('id-ID')}`;
        document.querySelector('.product-image-container img').src = productImage;
        document.querySelector('.product-image-container img').alt = productName;

        // Intercept form submission
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(form);
            const order = {
                id: Date.now().toString(),
                nama: formData.get('nama'),
                alamat: formData.get('alamat'),
                metode: formData.get('metode'),
                tanggal: formData.get('tanggal'),
                produk: productName,
                harga: parseInt(productPrice)
            };
            
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Pindah ke orders.html
            window.location.href = 'orders.html';
        });
    });
</script>
</body>
</html>
