<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Produk - Toko Karya Cemerlang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            line-height: 1.6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 40px 20px; 
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.3;
            animation: float 20s infinite alternate;
        }

        body::before {
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        body::after {
            background: var(--accent);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        #top-date-display {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-weight: 500; 
            color: var(--text-muted); 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 8px 16px; 
            border-radius: 50px; 
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            z-index: 1000; 
            font-size: 14px;
        }
        
        .checkout-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            max-width: 1100px;
            width: 100%;
            z-index: 1;
        }

        .product-preview {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border-right: 1px solid var(--border);
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .product-image-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            width: 85%;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            transition: var(--transition);
        }
        
        .product-image-container:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .product-details { position: relative; z-index: 1; }
        
        .product-details h3 { 
            font-size: 28px; 
            font-weight: 800; 
            margin-bottom: 15px; 
            color: white;
            letter-spacing: -0.5px;
        }
        
        .product-price { 
            font-size: 32px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px; 
        }

        .checkout-form-container {
            padding: 50px;
        }

        .checkout-form-container h2 {
            font-size: 32px; 
            font-weight: 800; 
            color: white; 
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .form-group { margin-bottom: 24px; }
        
        .form-group label {
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-muted); 
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-control {
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--border); 
            border-radius: 12px;
            font-size: 15px; 
            color: white; 
            background: rgba(0, 0, 0, 0.2); 
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
        }
        
        .form-control:focus {
            outline: none; 
            border-color: var(--primary); 
            background: rgba(0, 0, 0, 0.4); 
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        select.form-control option {
            background: var(--bg-dark);
            color: white;
        }

        textarea.form-control { resize: vertical; min-height: 120px; }

        .action-buttons {
            display: flex; gap: 20px; margin-top: 40px;
        }

        .btn {
            padding: 16px 24px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer;
            transition: var(--transition); 
            border: none; 
            flex: 1; 
            text-align: center; 
            text-decoration: none;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; 
            box-shadow: 0 0 20px var(--primary-glow);
        }
        
        .btn-primary:hover { 
            box-shadow: 0 0 30px var(--primary-glow); 
            transform: translateY(-2px); 
        }
        
        .btn-outline { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            color: var(--text-main); 
        }
        
        .btn-outline:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: rgba(255, 255, 255, 0.2); 
            transform: translateY(-2px);
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }
        
        input[type="date"][readonly] {
            opacity: 0.7;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            border-color: transparent;
        }

        @media (max-width: 900px) {
            .checkout-wrapper { grid-template-columns: 1fr; }
            .product-preview { border-right: none; border-bottom: 1px solid var(--border); padding: 40px 20px; }
            .product-image-container { width: 60%; max-width: 300px; }
            .checkout-form-container { padding: 40px 20px; }
            .action-buttons { flex-direction: column-reverse; gap: 15px; }
            body { padding: 20px; }
        }
    </style>
</head>
<body>
<div id="top-date-display">
    📅 Memuat tanggal...
</div>

<div class="checkout-wrapper">
    <!-- Product Summary -->
    <div class="product-preview">
        <div class="product-image-container">
            <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=600&q=80" alt="Lenovo ThinkPad X1" style="max-width: 100%; max-height: 100%; border-radius: 12px; object-fit: contain; mix-blend-mode: normal;">
        </div>
        <div class="product-details">
            <h3>Lenovo ThinkPad X1</h3>
            <div class="product-price">Rp 14.500.000</div>
            <p style="color: var(--text-muted); font-size: 14px; background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 50px; display: inline-block; border: 1px solid var(--border);">✨ Termasuk Garansi Toko & Asuransi Pengiriman</p>
        </div>
    </div>

    <!-- Form Section -->
    <div class="checkout-form-container">
        <h2>Formulir Pembelian</h2>
        <form action="orders.html" method="GET">
            <div class="form-group">
                <label>Nama Lengkap Pembeli</label>
                <input type="text" name="nama" class="form-control" placeholder="Masukkan nama lengkap Anda" required>
            </div>
            
            <div class="form-group">
                <label>Alamat Pengiriman</label>
                <textarea name="alamat" class="form-control" placeholder="Sertakan detail seperti jalan, nomor rumah, rt/rw, dan kecamatan" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Metode Pembayaran</label>
                <select name="metode" class="form-control" required>
                    <option value="Transfer Bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                    <option value="COD">Bayar di Tempat (COD)</option>
                    <option value="E-Wallet">E-Wallet (GoPay/OVO/Dana)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tanggal Pembelian</label>
                <input type="date" name="tanggal" id="tanggal-input" class="form-control" required readonly>
            </div>

            <div class="action-buttons">
                <a href="javascript:history.back()" class="btn btn-outline">Kembali</a>
                <button type="submit" class="btn btn-primary">Konfirmasi & Bayar</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Set auto date
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const formattedDate = `${yyyy}-${mm}-${dd}`;
        
        document.getElementById('tanggal-input').value = formattedDate;

        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const displayDate = `${today.getDate()} ${months[today.getMonth()]} ${today.getFullYear()}`;
        document.getElementById('top-date-display').innerHTML = `📅 ${displayDate}`;

        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const productName = urlParams.get('name') || 'Laptop Seken';
        const productPrice = urlParams.get('price') || '0';
        const productImage = urlParams.get('img') || 'https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?auto=format&fit=crop&w=600&q=80';

        // Update preview content
        document.querySelector('.product-details h3').innerText = productName;
        document.querySelector('.product-price').innerText = `Rp ${parseInt(productPrice).toLocaleString('id-ID')}`;
        document.querySelector('.product-image-container img').src = productImage;
        document.querySelector('.product-image-container img').alt = productName;

        // Intercept form submission
        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(form);
            const order = {
                id: Date.now().toString(),
                nama: formData.get('nama'),
                alamat: formData.get('alamat'),
                metode: formData.get('metode'),
                tanggal: formData.get('tanggal'),
                produk: productName,
                harga: parseInt(productPrice)
            };
            
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Pindah ke orders.html
            window.location.href = 'orders.html';
        });
    });
</script>
</body>
</html>
