<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Order - Toko Karya Cemerlang</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --card-bg: rgba(24, 24, 27, 0.65);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }

        body::before {
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        body::after {
            background: var(--accent);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* NAVBAR */
        header {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* DASHBOARD CONTENT */
        .dashboard {
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .card-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card.green::before {
            background: linear-gradient(90deg, var(--success), #34d399);
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card h1 {
            color: white;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* TABLE */
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow-x: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 15px;
            vertical-align: middle;
            transition: var(--transition);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-flex;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
        }

        .price-text {
            font-weight: 700;
            color: #34d399;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .btn-edit {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.2);
        }

        .btn-edit:hover {
            background: rgba(245, 158, 11, 0.2);
            transform: translateY(-2px);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
            transform: translateY(-2px);
        }
        
        .btn-print {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--border);
        }
        
        .btn-print:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: white;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-muted);
        }

        /* FILTER INPUT */
        input[type="date"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 10px;
            padding: 8px 14px;
            outline: none;
            font-family: 'Outfit', sans-serif;
            transition: var(--transition);
            color-scheme: dark;
        }

        input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* SPONSORS SECTION */
        .sponsors-section {
            padding: 60px 0 20px 0;
            text-align: center;
            margin-top: 40px;
        }

        .sponsors-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .sponsors-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 50px;
        }

        .sponsor-item {
            font-size: 28px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.15);
            transition: var(--transition);
            letter-spacing: -1px;
            cursor: default;
        }

        .sponsor-item:hover {
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: translateY(-3px) scale(1.05);
        }

        @media print {
            header, .action-column, .action-buttons, .sponsors-section { display: none !important; }
            body { background: white; color: black; }
            .dashboard { padding: 0; }
            .table-container { box-shadow: none; border: 1px solid #ccc; background: white; }
            .stat-card { border: 1px solid #ccc; background: white; color: black; }
            .stat-card h1 { color: black; }
            td, th { color: black; }
            body::before, body::after { display: none; }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">Dashboard Orderan</div>
        <div class="nav-buttons">
            <form action="orders.html" method="GET" style="display: flex; align-items: center; margin-right: 15px;">
                <label for="date-filter" style="color: var(--text-muted); font-size: 14px; margin-right: 12px; font-weight: 500;">📅 Filter Tanggal:</label>
                <input type="date" id="date-filter" name="date" value="" onchange="this.form.submit()">
            </form>
            <a href="analytics.html" class="btn btn-outline" style="margin-right: 8px;">
                📊 Laporan
            </a>
            <a href="index.html" class="btn btn-outline">Menu Utama</a>
        </div>
    </header>

    <div class="dashboard">

        <div class="card-box">
            <div class="stat-card">
                <h3>Total Order Berhasil</h3>
                <h1 id="stat-total-order">2</h1>
            </div>

            <div class="stat-card green">
                <h3>Total Pendapatan (Estimasi)</h3>
                <h1 id="stat-total-pendapatan">
                    Rp 26.500.000
                </h1>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nama Pemesan</th>
                        <th>Alamat</th>
                        <th>Produk</th>
                        <th>Pembayaran</th>
                        <th>Harga</th>
                        <th class="action-column">Aksi</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <!-- Data pesanan akan dimuat secara dinamis oleh JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- SPONSORS SECTION -->
        <div class="sponsors-section">
            <div class="sponsors-title">Sponsor Resmi</div>
            <div class="sponsors-grid">
                <div class="sponsor-item">ASUS ROG</div>
                <div class="sponsor-item">Lenovo Legion</div>
                <div class="sponsor-item">HP Omen</div>
                <div class="sponsor-item">Dell Alienware</div>
                <div class="sponsor-item">Acer Predator</div>
                <div class="sponsor-item">MSI</div>
            </div>
        </div>

    </div>

    <script>
        // Data default jika localStorage kosong
        const defaultOrders = [
            {
                id: '1',
                nama: 'Budi Santoso',
                alamat: 'Jl. Sudirman No. 1, Jakarta Pusat',
                produk: 'Lenovo ThinkPad X1',
                metode: 'Transfer Bank',
                harga: 14500000,
                tanggal: '2026-05-16'
            },
            {
                id: '2',
                nama: 'Siti Aminah',
                alamat: 'Jl. Malioboro No. 2, Yogyakarta',
                produk: 'Dell XPS 13',
                metode: 'COD',
                harga: 12000000,
                tanggal: '2026-05-16'
            }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const dateParam = urlParams.get('date');
            
            // Periksa jika ada submission dari form tanpa JS (fallback)
            const nama = urlParams.get('nama');
            const alamat = urlParams.get('alamat');
            const metode = urlParams.get('metode');
            const tanggalParam = urlParams.get('tanggal');

            let orders = JSON.parse(localStorage.getItem('orders'));
            
            if (!orders || orders.length === 0) {
                orders = defaultOrders;
                localStorage.setItem('orders', JSON.stringify(orders));
            }

            // Fallback penambahan data dari URL GET lama (jika ada)
            if (nama && alamat && metode && tanggalParam && !dateParam) {
                const newOrder = {
                    id: Date.now().toString(),
                    nama: nama,
                    alamat: alamat,
                    produk: 'Lenovo ThinkPad X1',
                    metode: metode,
                    harga: 14500000,
                    tanggal: tanggalParam
                };
                orders.push(newOrder);
                localStorage.setItem('orders', JSON.stringify(orders));
                // Bersihkan URL dari data form yang submit via GET lama
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            if (dateParam) {
                document.getElementById('date-filter').value = dateParam;
            }

            renderOrders(orders, dateParam);
        });

        function renderOrders(orders, filterDate) {
            const tbody = document.getElementById('orders-table-body');
            tbody.innerHTML = ''; // Kosongkan isi saat ini

            let totalOrder = 0;
            let totalPendapatan = 0;

            orders.forEach(order => {
                if (filterDate && order.tanggal !== filterDate) return;

                totalOrder++;
                totalPendapatan += parseInt(order.harga);

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 600; color: white;">${order.nama}</td>
                    <td style="color: var(--text-muted); font-size: 14px; max-width: 300px;">${order.alamat}</td>
                    <td>
                        <span class="badge">${order.produk}</span>
                    </td>
                    <td>${order.metode}</td>
                    <td class="price-text">Rp ${parseInt(order.harga).toLocaleString('id-ID')}</td>
                    <td class="action-buttons">
                        <a href="edit_order.html?id=${order.id}" class="btn-sm btn-edit">Edit</a>
                        <a href="javascript:deleteOrder('${order.id}');" class="btn-sm btn-delete">Hapus</a>
                        <a href="print_order.html?id=${order.id}" target="_blank" class="btn-sm btn-print">Cetak Nota</a>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Update stats
            document.getElementById('stat-total-order').textContent = totalOrder;
            document.getElementById('stat-total-pendapatan').textContent = 'Rp ' + totalPendapatan.toLocaleString('id-ID');

            if (totalOrder === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><h3>Belum ada pesanan</h3><p>Pesanan yang cocok dengan filter akan muncul di sini</p></td></tr>';
            }
        }

        function deleteOrder(id) {
            if (confirm('Yakin ingin menghapus order ini?')) {
                let orders = JSON.parse(localStorage.getItem('orders')) || [];
                orders = orders.filter(o => o.id !== id);
                localStorage.setItem('orders', JSON.stringify(orders));
                
                const urlParams = new URLSearchParams(window.location.search);
                renderOrders(orders, urlParams.get('date'));
            }
        }
    </script>
</body>

</html>
